section_type: system_component
title: Defiant Sky Anomaly Detection Core
description: >
  Policy-governed ML anomaly detection core for Resident Space Objects (RSOs).
  Ingests normalized orbital observations, estimates expected motion, scores
  deviations, classifies anomaly candidates, and routes all non-trivial outcomes
  through Guardrail and operator review before escalation. Must continue operating
  in degraded mode under partial sensor loss.

requirements:
  - Include an ObservationNormalizer component
  - Include an OrbitPropagator component
  - Include a DeviationScorer component
  - Include an AnomalyClassifier component
  - Include a GuardrailGateway component
  - Include a ReviewQueueManager component
  - Include a DegradedModeHandler component
  - Include an AuditTrailWriter component
  - Define an RSObservation model with object_id, timestamp, position_eci, velocity_eci, sensor_source, and data_quality
  - Define an AnomalyRecord model with anomaly_id, observation_id, object_id, anomaly_type, deviation_score, confidence, status, guardrail_cleared, operator_review_required, reason_codes, and reasoning
  - Include API surface for observation ingest and anomaly review
  - Include audit trail persistence hooks
  - Include degraded-mode handling behavior
  - Include Guardrail policy enforcement before escalation or outbound action
  - RSObservation must be implemented as a Python dataclass named RSObservation
  - "RSObservation must include typed fields: object_id, timestamp, position_eci, velocity_eci, sensor_source, data_quality"
  - RSObservation must include a validate() method that raises ValueError when data_quality is outside 0.0 to 1.0
  - AnomalyRecord must be implemented as a Python dataclass named AnomalyRecord
  - "AnomalyRecord must include status values: pending, approved, rejected"
  - "AnomalyRecord must include a mark_reviewed(status: str) method"
  - "AnomalyRecord must include typed fields: anomaly_id, observation_id, object_id, anomaly_type, deviation_score, confidence, status, guardrail_cleared, operator_review_required, reason_codes, reasoning"
  - AnomalyClassifier must be implemented as a Python class named AnomalyClassifier
  - AnomalyClassifier must expose a classify(observation, expected_state) method
  - classify must return anomaly_type and confidence
  - "anomaly_type must be one of: RPO, maneuver, conjunction, or unknown"
  - "ObservationNormalizer must expose normalize_observation(raw_data: dict) -> dict"
  - ObservationNormalizer must return a normalized observation structure with object_id, timestamp, position_eci, velocity_eci, sensor_source, and data_quality
  - "OrbitPropagator must expose propagate_orbit(normalized_observation: dict, time_step: float) -> dict"
  - OrbitPropagator must return expected_position_eci and expected_velocity_eci
  - "DeviationScorer must expose score_deviation(observed_state: dict, expected_state: dict) -> float"
  - AnomalyClassifier classify must return anomaly_type and confidence using keys with exactly those names
  - "GuardrailGateway must expose enforce_policy(anomaly_record: dict) -> bool"
  - "ReviewQueueManager must expose submit_for_review(anomaly_record: dict) -> dict"
  - "ReviewQueueManager must expose update_review_status(anomaly_id: str, status: str) -> dict"
  - ingest_observation must normalize input, compute expected state, score deviation, classify anomaly, and return anomaly_type, confidence, and deviation_score
  - review_anomaly must accept only approved or rejected status values 

constraints:
  - Maintain ingest, scoring, and anomaly persistence with >=60% sensor availability
  - If sensor availability drops below 60%, block escalation and force review-only mode
  - No autonomous escalation without operator authorization
  - Persist all anomaly records with full audit trail and reason codes
  - Enforce Guardrail policy before any escalation or outbound action
  - Block action when confidence is below threshold or degraded confidence policy fails

expected_targets:
  - path: src/models/rsobservation.py
    purpose: Define the RSObservation data model for normalized orbital observations
  - path: src/models/anomaly_record.py
    purpose: Define the AnomalyRecord model for scored and classified anomalies
  - path: src/components/observation_normalizer.py
    purpose: Normalize raw orbital observation data into a standard format
  - path: src/components/orbit_propagator.py
    purpose: Estimate expected motion of RSOs from normalized observations
  - path: src/components/deviation_scorer.py
    purpose: Score deviations between observed and expected motion
  - path: src/components/anomaly_classifier.py
    purpose: Classify anomaly candidates and assign confidence values
  - path: src/components/guardrail_gateway.py
    purpose: Enforce Guardrail policy before escalation or outbound action
  - path: src/components/review_queue_manager.py
    purpose: Queue anomalies for operator review and track review state
  - path: src/components/degraded_mode_handler.py
    purpose: Handle degraded-mode behavior when sensor availability drops below threshold
  - path: src/components/audit_trail_writer.py
    purpose: Persist anomaly handling actions and review decisions to the audit trail
  - path: src/api/ingest.py
    purpose: Provide observation ingestion entry points for anomaly detection
  - path: src/api/review.py
    purpose: Provide review and escalation entry points for anomaly records
  - path: tests/test_anomaly_detection.py
    purpose: Provide initial scaffold tests for anomaly detection workflow
  - path: src/__init__.py
    purpose: Mark src as a Python package for Defiant Sky anomaly detection code
  - path: src/models/__init__.py
    purpose: Mark models as a Python package for anomaly detection data models
  - path: src/components/__init__.py
    purpose: Mark components as a Python package for anomaly detection components
  - path: src/api/__init__.py
    purpose: Mark api as a Python package for Defiant Sky service entry points
  - path: tests/__init__.py
    purpose: Mark tests as a Python package for anomaly detection test scaffolds